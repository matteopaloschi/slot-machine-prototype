<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Máquina de Festa Junina</title>
    <link rel="stylesheet" href="styles.css?v=20260629-2" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Tigrinho da Réptil Durval </h1>
        <p class="subtitle">Slots visuais, prêmio real via Arduino.</p>

        <div class="status-box" id="status">Aguardando ficha...</div>

        <div class="reels">
          <div class="reel" id="reel-0">🍒</div>
          <div class="reel" id="reel-1">🍋</div>
          <div class="reel" id="reel-2">🦎</div>
        </div>

        <div class="controls">
          <button id="insert-btn">Inserir ficha</button>
          <button id="toggle-btn" class="primary">Iniciar giro</button>
          <button id="connect-btn">Conectar Arduino</button>
        </div>

        <div class="result" id="result">Pronto para jogar.</div>
      </section>
    </main>

    <script src="app.js?v=20260629-2"></script>
  </body>
</html>
