<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Máquina de Festa Junina</title>
    <link rel="stylesheet" href="styles.css?v=20260630-1" />
  </head>
  <body>
    <main class="app">
      <section class="panel hero-panel" id="home-view">
        <div class="hero-icon" aria-hidden="true">🎰</div>
        <h1>Tigrinho da Réptil Durval</h1>
        <p class="subtitle">Uma experiência de caça-níquel com Arduino, animação de slots e prêmio real.</p>

        <div class="hero-actions">
          <button id="connect-home-btn" class="button button--secondary">Conectar com Arduino</button>
          <button id="start-game-btn" class="button button--primary">Iniciar Jogo</button>
        </div>

        <p class="helper-text" id="home-status">Conecte o Arduino ou entre direto no jogo.</p>
      </section>

      <section class="panel game-panel is-hidden" id="game-view" hidden>
        <h2>Modo de Jogo</h2>
        <p class="subtitle">Insira sua ficha, inicie o giro e veja o resultado.</p>

        <div class="status-box" id="status">Aguardando ficha...</div>

        <div class="reels" id="reels-container" style="position:relative;">
          <div class="reel" id="reel-0">🍒</div>
          <div class="reel" id="reel-1">🍋</div>
          <div class="reel" id="reel-2">🦎</div>
          <div class="win-overlay is-hidden" id="win-overlay" aria-live="polite" aria-atomic="true">
            <span class="win-overlay__message" id="win-overlay-msg"></span>
          </div>
        </div>

        <div class="controls">
          <button id="insert-btn">Inserir ficha</button>
          <button id="toggle-btn" class="primary">Iniciar giro</button>
          <button id="connect-btn">Conectar Arduino</button>
        </div>

        <div class="result" id="result">Pronto para jogar.</div>
      </section>
    </main>

    <script type="module" src="app.js?v=20260630-2"></script>
  </body>
</html>
